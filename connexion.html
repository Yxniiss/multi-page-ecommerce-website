<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login TechHub</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="page-special">

  <header>
    <a href="/index.html" class="logo">
      <img src="/image/télécharger.png" alt="Logo" />
      <span>TechHub</span>
    </a>

    <nav>
      <ul>
        <li><a href="/connexion.html">Connexion</a></li>
        <li><a href="/inscription.html">Inscription</a></li>
      </ul>
    </nav>
  </header>

  <section id="connexion">
    <h2>Connexion</h2>
    <form class="login-form" onsubmit="showConnectionMessage(event)">
      <div class="form-group">
        <label for="prenom">Prénom :</label>
        <input type="text" id="prenom" name="prenom" placeholder="Votre prénom" required />
      </div>
      <div class="form-group">
        <label for="email">Adresse Email :</label>
        <input type="email" id="email" name="email" placeholder="Votre email" required />
      </div>
      <div class="form-group">
        <label for="password">Mot de Passe :</label>
        <input type="password" id="password" name="password" placeholder="Votre mot de passe" required />
      </div>
      <div class="form-actions">
        <button type="submit">Se Connecter</button>
        <a href="/inscription.html" class="register-link">Pas de compte ? Inscrivez-vous.</a>
      </div>
    </form>
  </section>

  <footer> 
    <ul>
        <li><b>Information légale</b></li>
        <ul>
        <li> <a href="https://www.mahivajewelry.com/pages/politique-de-confidentialite">Conditions général de vente |</a></li>
        <li> <a href="https://www.mahivajewelry.com/pages/politique-de-confidentialite"> Politique de confidentialité |</a></li>
        <li> <a href="https://www.mahivajewelry.com/pages/retours-echanges-bijoux"> Retour & Echange</a></li>
    </ul>
    </ul>
  </footer>

  <script src="/connexion.js"></script>

</body>
</html>
